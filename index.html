<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>变频器产品助手 - 申请试用</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:linear-gradient(160deg,#FFF5F5,#FDE8E8,#FFFBFB); min-height:100vh; padding:36px 20px; display:flex; flex-direction:column; align-items:center; }
.card { background:#fff; border-radius:20px; padding:32px 28px; width:calc(100vw - 40px); max-width:400px; box-shadow:0 4px 24px rgba(196,18,48,.08); text-align:center; margin-bottom:20px; }
.title { font-size:22px; font-weight:700; color:#C0392B; margin-bottom:4px; }
.subtitle { font-size:13px; color:#999; margin-bottom:20px; }
.qrcode-img { width:200px; height:200px; margin:0 auto; border-radius:12px; border:1px solid #f0f0f0; display:block; }
.qrcode-label { font-size:13px; color:#C0392B; margin-top:12px; font-weight:600; }
.qrcode-sub { font-size:12px; color:#aaa; margin-top:4px; }

.tabs { display:flex; gap:0; margin-bottom:20px; background:#f5f5f5; border-radius:12px; padding:4px; }
.tab { flex:1; height:42px; line-height:42px; text-align:center; font-size:15px; color:#999; border-radius:10px; transition:all .2s; cursor:pointer; }
.tab--active { background:#fff; color:#C0392B; font-weight:600; box-shadow:0 2px 8px rgba(0,0,0,.06); }

/* 两个面板绝对定位重叠，切换不变宽度 */
.panels-wrap { position:relative; min-height:230px; }
.tab-panel { position:absolute; top:0; left:0; width:100%; opacity:0; pointer-events:none; transition:opacity .15s; }
.tab-panel--show { position:relative; opacity:1; pointer-events:auto; }

.input-wrap { margin-bottom:16px; }
.input-wrap input { width:100%; height:50px; border:1px solid #E8E8E8; border-radius:12px; padding:0 16px; font-size:16px; text-align:center; outline:none; }
.input-wrap input:focus { border-color:#C0392B; }

.btn { width:100%; height:50px; line-height:50px; border-radius:12px; font-size:16px; font-weight:600; border:none; cursor:pointer; }
.btn--primary { background:#C0392B; color:#fff; }

.msg { font-size:14px; padding:12px; border-radius:10px; margin-top:16px; line-height:1.6; display:none; }
.msg--show { display:block; }
.msg--ok { background:#E8F8F0; color:#27ae60; }
.msg--no { background:#FFF3CD; color:#856404; }
.msg--info { background:#F0F2FF; color:#5A6ABF; }

.hint { font-size:13px; color:#E05858; margin-top:6px; display:none; }
.tip { font-size:12px; color:#bbb; margin-top:8px; text-align:center; width:100%; }
.admin-link { font-size:12px; color:#999; margin-top:20px; text-align:center; width:100%; }
.admin-link a { color:#C0392B; }

.admin-panel { width:calc(100vw - 40px); max-width:400px; display:none; }
.admin-panel--show { display:block; }
.admin-card { background:#fff; border-radius:20px; padding:24px; margin-bottom:16px; box-shadow:0 4px 24px rgba(196,18,48,.08); }
.admin-card h3 { font-size:16px; color:#C0392B; margin-bottom:12px; }
.admin-list { list-style:none; text-align:left; }
.admin-list li { font-size:14px; padding:10px 0; border-bottom:1px solid #f5f5f5; color:#333; user-select:text; }
.admin-list li:last-child { border-bottom:none; }
.admin-badge { font-size:12px; padding:2px 8px; border-radius:8px; float:right; }
.admin-badge--ok { background:#E8F8F0; color:#27ae60; }
.admin-badge--pending { background:#FFF3CD; color:#856404; }
.admin-empty { font-size:14px; color:#999; text-align:center; padding:20px 0; }
.admin-back { font-size:13px; color:#C0392B; text-align:center; margin-top:16px; cursor:pointer; }
.count-row { display:flex; gap:12px; margin-bottom:16px; }
.count-box { flex:1; background:#fafafa; border-radius:12px; padding:16px; text-align:center; }
.count-num { font-size:28px; font-weight:700; color:#C0392B; }
.count-label { font-size:12px; color:#999; margin-top:4px; }
.err { font-size:13px; color:#E05858; margin-top:8px; text-align:center; display:none; }
</style>
</head>
<body>

<div id="user-view">

<div class="card" id="qrcode-card">
  <div class="title">变频器产品助手</div>
  <div class="subtitle">内部测试版 · 微信扫码体验</div>
  <img class="qrcode-img" id="qrcodeImg" src="" alt="小程序体验码" />
  <div class="qrcode-label">已添加的用户请长按识别进入</div>
  <div class="qrcode-sub" id="qrcodeStatus"></div>
</div>

<div class="card" id="action-card">
  <div class="tabs">
    <div class="tab tab--active" id="tabSubmit" onclick="switchTab('submit')">提交申请</div>
    <div class="tab" id="tabQuery" onclick="switchTab('query')">查询状态</div>
  </div>

  <div class="panels-wrap">
    <div class="tab-panel tab-panel--show" id="panelSubmit">
      <div class="subtitle" style="margin-bottom:16px;">填写微信名提交申请，管理员添加后即可体验</div>
      <div class="input-wrap">
        <input id="submitInput" type="text" placeholder="请输入您的微信名称" maxlength="30" autocomplete="off" />
      </div>
      <div class="hint" id="submitHint">请输入微信名称</div>
      <button class="btn btn--primary" onclick="doSubmit()">提交申请</button>
      <div class="msg" id="submitMsg"></div>
    </div>

    <div class="tab-panel" id="panelQuery">
      <div class="subtitle" style="margin-bottom:16px;">输入微信名，查询是否已在体验名单中</div>
      <div class="input-wrap">
        <input id="queryInput" type="text" placeholder="请输入微信名称" maxlength="30" autocomplete="off" />
      </div>
      <div class="hint" id="queryHint">请输入微信名称</div>
      <button class="btn btn--primary" onclick="doQuery()">查询</button>
      <div class="msg" id="queryMsg"></div>
    </div>
  </div>
</div>

<div class="err" id="loadErr"></div>
<div class="tip">中车株洲所 · 国家变流中心</div>
<div class="admin-link"><a href="#" onclick="showAdmin()">管理员入口</a></div>

</div>

<!-- ==================== 管理员端 ==================== -->
<div class="admin-panel" id="admin-view">
  <div class="count-row">
    <div class="count-box"><div class="count-num" id="countApproved">-</div><div class="count-label">已通过</div></div>
    <div class="count-box"><div class="count-num" id="countPending">-</div><div class="count-label">待添加</div></div>
  </div>
  <div class="admin-card">
    <h3>已通过名单（长按可复制）</h3>
    <ul class="admin-list" id="approvedListEl"></ul>
  </div>
  <div class="admin-card">
    <h3>待添加名单（长按可复制）</h3>
    <ul class="admin-list" id="pendingListEl"></ul>
  </div>
  <div class="admin-back" onclick="hideAdmin()">← 返回申请页</div>
  <div class="tip">中车株洲所 · 国家变流中心</div>
</div>

<script>
// ====== 配置 ======
const CONFIG = {
  approvedUrl: './approved.json',
  pendingUrl: './pending.json',
  qrcodeUrl: 'https://juyuan1-1446297214.cos.ap-guangzhou.myqcloud.com/apply/qrcode.jpg',
  adminPassword: 'tgs2026',
  githubToken: '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',
  githubApi: 'https://api.github.com/repos/juyaun/vfd-apply/contents/pending.json',
};

let approvedList = [];
let pendingList = [];

(function init() {
  document.getElementById('qrcodeImg').src = CONFIG.qrcodeUrl + '?v=' + Date.now();
  loadData();
})();

// ====== 数据加载 ======
async function loadApproved() {
  var resp = await fetch(CONFIG.approvedUrl + '?t=' + Date.now());
  if (!resp.ok) throw new Error('approved HTTP ' + resp.status);
  approvedList = (await resp.json()).names || [];
}
async function loadPending() {
  var resp = await fetch(CONFIG.pendingUrl + '?t=' + Date.now());
  if (!resp.ok) throw new Error('pending HTTP ' + resp.status);
  pendingList = (await resp.json()).names || [];
}
async function loadData() {
  try {
    await Promise.all([loadApproved(), loadPending()]);
    document.getElementById('loadErr').style.display = 'none';
  } catch (e) {
    document.getElementById('loadErr').style.display = 'block';
    document.getElementById('loadErr').textContent = '数据加载失败（' + e.message + '），请检查网络后刷新';
  }
}

// ====== 标签切换（绝对定位，宽度不变） ======
function switchTab(tab) {
  document.getElementById('tabSubmit').classList.toggle('tab--active', tab === 'submit');
  document.getElementById('tabQuery').classList.toggle('tab--active', tab === 'query');
  document.getElementById('panelSubmit').classList.toggle('tab-panel--show', tab === 'submit');
  document.getElementById('panelQuery').classList.toggle('tab-panel--show', tab === 'query');
  document.getElementById('submitMsg').className = 'msg';
  document.getElementById('queryMsg').className = 'msg';
}

// ====== 查询 ======
function doQuery() {
  var name = document.getElementById('queryInput').value.trim();
  if (!name) { document.getElementById('queryHint').style.display='block'; return; }
  document.getElementById('queryHint').style.display='none';
  loadData().then(function() {
    var box = document.getElementById('queryMsg');
    if (approvedList.indexOf(name) !== -1) {
      box.className = 'msg msg--show msg--ok';
      box.textContent = '「' + name + '」已在体验名单中，长按上方小程序码即可进入';
    } else if (pendingList.indexOf(name) !== -1) {
      box.className = 'msg msg--show msg--no';
      box.textContent = '「' + name + '」已提交申请，请等待管理员范保硕添加，添加后即可使用';
    } else {
      box.className = 'msg msg--show msg--no';
      box.textContent = '「' + name + '」未在体验名单中。如已提交申请请等待管理员范保硕添加；如尚未提交，请切换到「提交申请」登记您的微信名';
    }
  });
}

// ====== 提交（写 GitHub API） ======
function doSubmit() {
  var name = document.getElementById('submitInput').value.trim();
  if (!name) { document.getElementById('submitHint').style.display='block'; return; }
  document.getElementById('submitHint').style.display='none';

  loadData().then(function() {
    var box = document.getElementById('submitMsg');
    if (approvedList.indexOf(name) !== -1) {
      box.className = 'msg msg--show msg--ok';
      box.textContent = '「' + name + '」已在体验名单中，长按上方小程序码即可进入';
      return;
    }
    if (pendingList.indexOf(name) !== -1) {
      box.className = 'msg msg--show msg--info';
      box.textContent = '「' + name + '」已提交过申请，请耐心等待管理员范保硕添加';
      return;
    }
    // 调用 GitHub API 写入 pending.json
    box.className = 'msg msg--show msg--info';
    box.textContent = '提交中...';
    writeToPending(name, box);
  });
}

async function writeToPending(name, box) {
  try {
    // 1. 先读取当前文件（获取 SHA）
    var getResp = await fetch(CONFIG.githubApi, {
      headers: { Authorization: 'Bearer ' + CONFIG.githubToken }
    });
    if (!getResp.ok) throw new Error('读取失败');
    var fileData = await getResp.json();
    var sha = fileData.sha;
    var current = JSON.parse(atob(fileData.content.replace(/\n/g, '')));
    var names = current.names || [];
    if (names.indexOf(name) !== -1) {
      box.textContent = '「' + name + '」已提交过，请耐心等待管理员范保硕添加';
      return;
    }
    names.push(name);

    // 2. 写入更新
    var newContent = btoa(unescape(encodeURIComponent(JSON.stringify({ names: names }, null, 2))));
    var putResp = await fetch(CONFIG.githubApi, {
      method: 'PUT',
      headers: {
        Authorization: 'Bearer ' + CONFIG.githubToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'add ' + name,
        content: newContent,
        sha: sha
      })
    });
    if (!putResp.ok) throw new Error('写入失败 HTTP ' + putResp.status);

    pendingList.push(name);
    box.textContent = '已提交「' + name + '」，等待管理员范保硕添加后即可使用';
  } catch (e) {
    box.textContent = '提交失败（' + e.message + '），请截图此页面发送给管理员范保硕';
  }
}

// ====== 管理员 ======
function showAdmin() {
  var pw = prompt('管理员密码：');
  if (pw !== CONFIG.adminPassword) { alert('密码错误'); return; }
  loadData().then(function() {
    document.getElementById('user-view').style.display = 'none';
    document.getElementById('admin-view').classList.add('admin-panel--show');
    document.getElementById('countApproved').textContent = approvedList.length;
    document.getElementById('countPending').textContent = pendingList.length;
    document.getElementById('approvedListEl').innerHTML = renderList(approvedList, 'ok');
    document.getElementById('pendingListEl').innerHTML = renderList(pendingList, 'pending');
  });
}
function hideAdmin() {
  document.getElementById('user-view').style.display = 'block';
  document.getElementById('admin-view').classList.remove('admin-panel--show');
}
function renderList(list, type) {
  if (!list.length) return '<div class="admin-empty">暂无</div>';
  var badge = type === 'ok' ? '已通过' : '待添加';
  var cls = type === 'ok' ? 'admin-badge--ok' : 'admin-badge--pending';
  return list.map(function(n) {
    return '<li>' + escapeHtml(n) + '<span class="admin-badge ' + cls + '">' + badge + '</span></li>';
  }).join('');
}
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
