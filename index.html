<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>变频器产品助手 - 申请试用</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:linear-gradient(160deg,#FFF5F5,#FDE8E8,#FFFBFB); min-height:100vh; padding:36px 20px; display:flex; flex-direction:column; align-items:center; }
.card { background:#fff; border-radius:20px; padding:32px 28px; width:100%; max-width:400px; box-shadow:0 4px 24px rgba(196,18,48,.08); text-align:center; margin-bottom:20px; }
.logo { font-size:40px; margin-bottom:8px; }
.title { font-size:22px; font-weight:700; color:#C0392B; margin-bottom:4px; }
.subtitle { font-size:13px; color:#999; margin-bottom:20px; }

.qrcode-img { width:200px; height:200px; margin:0 auto; border-radius:12px; border:1px solid #f0f0f0; display:block; }
.qrcode-label { font-size:13px; color:#C0392B; margin-top:12px; font-weight:600; }
.qrcode-sub { font-size:12px; color:#aaa; margin-top:4px; }

.divider { display:flex; align-items:center; gap:12px; margin:24px 0; }
.divider-line { flex:1; height:1px; background:#eee; }
.divider-text { font-size:12px; color:#bbb; flex-shrink:0; }

.input-wrap { margin-bottom:16px; }
.input-wrap input { width:100%; height:50px; border:1px solid #E8E8E8; border-radius:12px; padding:0 16px; font-size:16px; text-align:center; outline:none; }
.input-wrap input:focus { border-color:#C0392B; }

.btn { width:100%; height:50px; line-height:50px; border-radius:12px; font-size:16px; font-weight:600; border:none; }
.btn--primary { background:#C0392B; color:#fff; }
.btn--outline { background:#fff; color:#C0392B; border:1px solid #C0392B; margin-top:10px; }

.msg { font-size:14px; padding:12px; border-radius:10px; margin-top:16px; display:none; }
.msg--ok { display:block; background:#E8F8F0; color:#27ae60; }
.msg--wait { display:block; background:#FFF3CD; color:#856404; }
.msg--new { display:block; background:#F0F2FF; color:#5A6ABF; }

.hint { font-size:13px; color:#E05858; margin-top:6px; display:none; }
.tip { font-size:12px; color:#bbb; margin-top:8px; }
.admin-link { font-size:12px; color:#999; margin-top:20px; }
.admin-link a { color:#C0392B; }
.notify { margin-top:8px; }
.notify-desc { font-size:13px; color:#666; margin-bottom:12px; text-align:center; }
.notify-hint { font-size:12px; color:#aaa; margin-top:8px; text-align:center; }
</style>
</head>
<body>

<!-- 小程序码卡片：始终显示，已添加的人直接长按进 -->
<div class="card" id="qrcode-card">
  <div class="title">变频器产品助手</div>
  <div class="subtitle">内部测试版 · 微信扫码体验</div>
  <img class="qrcode-img" id="qrcodeImg" src="" alt="小程序体验码" />
  <div class="qrcode-label">👆 已添加的用户请长按识别进入</div>
  <div class="qrcode-sub" id="qrcodeStatus">加载中...</div>
</div>

<!-- 登记卡片：新人填 -->
<div class="card" id="form-card">
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">首次使用请登记</div>
    <div class="divider-line"></div>
  </div>
  <div class="subtitle" style="margin-bottom:16px;">登记后将自动记忆，下次扫码无需重复填写</div>
  <div class="input-wrap">
    <input id="nameInput" type="text" placeholder="请输入您的微信名称" maxlength="30" autocomplete="off" />
  </div>
  <div class="hint" id="nameHint">请输入微信名称</div>
  <button class="btn btn--primary" onclick="submitName()">提交申请</button>
  <div class="msg" id="msgBox"></div>
  <button class="btn btn--outline" id="recheckBtn" style="display:none;" onclick="recheck()">重新检查状态</button>
  <div class="notify" id="notifyBox" style="display:none;">
    <div class="divider"><div class="divider-line"></div><div class="divider-text">通知管理员</div><div class="divider-line"></div></div>
    <div class="notify-desc">请将以下消息发送给管理员，以便尽快添加：</div>
    <button class="btn btn--primary" onclick="copyNotify()">📋 一键复制并通知管理员</button>
    <div class="notify-hint">复制后将自动跳转微信，粘贴发送即可</div>
  </div>
</div>

<div class="tip">中车株洲所 · 国家变流中心</div>
<div class="admin-link"><a href="#" onclick="showAdmin()">管理员入口</a></div>

<script>
const CONFIG = {
  approvedUrl: 'https://juyuan1-1446297214.cos.ap-guangzhou.myqcloud.com/apply/approved.json',
  qrcodeUrl: 'https://juyuan1-1446297214.cos.ap-guangzhou.myqcloud.com/apply/qrcode.jpg',
  storageKey: 'vfd_apply_name',
  adminPassword: 'tgs2026',
};

let approvedList = [];

(async function init() {
  document.getElementById('qrcodeImg').src = CONFIG.qrcodeUrl;
  await loadApprovedList();
  const saved = readName();
  // 已添加 → 顶部提示已通过
  if (saved && approvedList.includes(saved)) {
    document.getElementById('qrcodeStatus').textContent = '✅ ' + saved + '，欢迎回来';
    document.getElementById('form-card').style.display = 'none';
  } else if (saved) {
    // 提交过但未通过 → 显示等待
    document.getElementById('qrcodeStatus').textContent = '⏳ ' + saved + '，等待管理员添加';
    document.getElementById('nameInput').value = saved;
    showMsg('wait', '已提交申请，请等待管理员将您添加至开发成员列表。添加完成后刷新本页面即可进入。');
    document.getElementById('recheckBtn').style.display = 'block';
  } else {
    document.getElementById('qrcodeStatus').textContent = '首次使用请填写下方登记信息';
  }
})();

async function loadApprovedList() {
  try {
    const resp = await fetch(CONFIG.approvedUrl + '?t=' + Date.now());
    if (resp.ok) { const data = await resp.json(); approvedList = data.names || []; }
  } catch (e) {}
}

function readName() { try { return localStorage.getItem(CONFIG.storageKey) || ''; } catch(e) { return ''; } }
function saveName(n) { try { localStorage.setItem(CONFIG.storageKey, n); } catch(e) {} }

function showMsg(type, text) {
  const box = document.getElementById('msgBox');
  box.className = 'msg msg--' + type;
  box.textContent = text;
}

function submitName() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameHint').style.display='block'; return; }
  document.getElementById('nameHint').style.display='none';
  saveName(name);

  if (approvedList.includes(name)) {
    document.getElementById('qrcodeStatus').textContent = '✅ ' + name + '，欢迎回来';
    showMsg('ok', '您已在体验名单中，长按上方小程序码即可进入');
    document.getElementById('recheckBtn').style.display = 'none';
    document.getElementById('notifyBox').style.display = 'none';
  } else {
    document.getElementById('qrcodeStatus').textContent = '⏳ ' + name + '，等待管理员添加';
    showMsg('wait', '您的微信名尚未在体验名单中，请通知管理员尽快添加');
    document.getElementById('recheckBtn').style.display = 'block';
    document.getElementById('notifyBox').style.display = 'block';
  }
}

function copyNotify() {
  const name = document.getElementById('nameInput').value.trim();
  const msg = '【试用申请】微信名：' + name + '，申请加入变频器产品助手体验版，请添加至开发成员。';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(() => alert('已复制，请粘贴发送给管理员（范保硕）'));
  } else {
    prompt('请复制以下内容发送给管理员：', msg);
  }
}

function recheck() {
  loadApprovedList().then(() => {
    const saved = readName();
    if (saved && approvedList.includes(saved)) {
      document.getElementById('qrcodeStatus').textContent = '✅ ' + saved + '，欢迎回来';
      showMsg('ok', '审核已通过！长按上方小程序码即可进入');
      document.getElementById('recheckBtn').style.display = 'none';
    } else {
      showMsg('wait', '暂未通过，请耐心等待。');
    }
  });
}

function showAdmin() {
  const pw = prompt('管理员密码：');
  if (pw !== CONFIG.adminPassword) { alert('错误'); return; }
  const saved = readName();
  let info = '当前设备：' + (saved || '未登记') + '\n\n';
  info += '已通过名单(' + approvedList.length + '人)：\n' + (approvedList.length ? approvedList.join('\n') : '空');
  info += '\n\n修改名单：COS 上 apply/approved.json';
  alert(info);
}
</script>
</body>
</html>
